openapi: 3.1.0
info:
  title: Api
  version: 0.1.0
  description: SETTLE escrow platform API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: sellers
    description: Seller account operations
  - name: deals
    description: Deal management
  - name: transactions
    description: Transaction lifecycle
  - name: disputes
    description: Dispute management
  - name: admin
    description: Admin operations

paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /sellers/register:
    post:
      operationId: registerSeller
      tags: [sellers]
      summary: Register a new seller account
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SellerInput"
      responses:
        "201":
          description: Seller created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Seller"
        "400":
          description: Validation error

  /sellers/login:
    post:
      operationId: loginSeller
      tags: [sellers]
      summary: Login seller
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SellerLogin"
      responses:
        "200":
          description: Login successful
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "401":
          description: Invalid credentials

  /sellers/me:
    get:
      operationId: getSellerProfile
      tags: [sellers]
      summary: Get current seller profile
      responses:
        "200":
          description: Seller profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Seller"

  /sellers/me/dashboard:
    get:
      operationId: getSellerDashboard
      tags: [sellers]
      summary: Get seller dashboard stats
      responses:
        "200":
          description: Dashboard statistics
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DashboardStats"

  /deals:
    get:
      operationId: listDeals
      tags: [deals]
      summary: List all deals for the authenticated seller
      parameters:
        - name: status
          in: query
          schema:
            type: string
            enum: [created, locked, dispatched, delivered, settled, disputed]
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
        - name: offset
          in: query
          schema:
            type: integer
            default: 0
      responses:
        "200":
          description: List of deals
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DealList"
    post:
      operationId: createDeal
      tags: [deals]
      summary: Create a new deal/escrow link
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DealInput"
      responses:
        "201":
          description: Deal created with link
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Deal"

  /deals/{id}:
    get:
      operationId: getDeal
      tags: [deals]
      summary: Get deal by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Deal details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Deal"
        "404":
          description: Not found
    delete:
      operationId: deleteDeal
      tags: [deals]
      summary: Delete an unpaid deal
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /deals/link/{code}:
    get:
      operationId: getDealByCode
      tags: [deals]
      summary: Get deal by short code (buyer portal)
      parameters:
        - name: code
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Deal for buyer
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DealPublic"
        "404":
          description: Not found

  /deals/{id}/pay:
    post:
      operationId: initiatePayment
      tags: [deals]
      summary: Buyer initiates payment (locks funds)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PaymentInput"
      responses:
        "200":
          description: Payment initiated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Deal"

  /deals/{id}/fulfill:
    post:
      operationId: fulfillDeal
      tags: [deals]
      summary: Seller confirms fulfillment — irreversible
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/FulfillInput"
      responses:
        "200":
          description: Deal fulfilled, waiting for buyer confirmation
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Deal"
        "400":
          description: Deal is not in a fulfillable state
        "404":
          description: Not found

  /deals/{id}/dispatch:
    post:
      operationId: markDispatched
      tags: [deals]
      summary: Seller marks item as dispatched (legacy — use /fulfill instead)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Marked as dispatched
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Deal"

  /deals/{id}/confirm:
    post:
      operationId: confirmDelivery
      tags: [deals]
      summary: Buyer confirms delivery and releases funds — irreversible
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Funds released, deal settled
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Deal"
        "400":
          description: Deal is not in a confirmable state

  /deals/{id}/disputes:
    post:
      operationId: raiseDispute
      tags: [disputes]
      summary: Buyer raises a dispute
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DisputeInput"
      responses:
        "201":
          description: Dispute raised, funds frozen
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Dispute"

  /deals/{id}/disputes/refund:
    post:
      operationId: issueRefund
      tags: [disputes]
      summary: Seller issues full refund to resolve dispute
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Refund issued
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Deal"

  /deals/{id}/disputes/counter:
    post:
      operationId: submitCounterProof
      tags: [disputes]
      summary: Seller submits counter proof
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CounterProofInput"
      responses:
        "200":
          description: Counter proof submitted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Dispute"

  /activity:
    get:
      operationId: getRecentActivity
      tags: [deals]
      summary: Get recent activity feed for seller
      parameters:
        - name: limit
          in: query
          schema:
            type: integer
            default: 10
      responses:
        "200":
          description: Recent activity
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ActivityItem"

  /admin/disputes:
    get:
      operationId: listAdminDisputes
      tags: [admin]
      summary: List all disputed transactions for admin review
      responses:
        "200":
          description: All disputes
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/DisputeAdmin"

  /admin/disputes/{id}/resolve:
    post:
      operationId: resolveDispute
      tags: [admin]
      summary: Admin resolves a dispute
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DisputeResolution"
      responses:
        "200":
          description: Dispute resolved
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Dispute"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required: [status]

    Seller:
      type: object
      required: [id, name, email, phone, walletAddress, createdAt]
      properties:
        id:
          type: integer
        name:
          type: string
        email:
          type: string
        phone:
          type: string
        walletAddress:
          type: string
        totalEarnings:
          type: number
        createdAt:
          type: string

    SellerInput:
      type: object
      required: [name, email, phone, password, walletAddress]
      properties:
        name:
          type: string
        email:
          type: string
        phone:
          type: string
        password:
          type: string
        walletAddress:
          type: string

    SellerLogin:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
        password:
          type: string

    AuthResponse:
      type: object
      required: [token, seller]
      properties:
        token:
          type: string
        seller:
          $ref: "#/components/schemas/Seller"

    DashboardStats:
      type: object
      required: [totalDeals, settledDeals, activeDeals, disputedDeals, totalEarnings, pendingEarnings, recentSettlements]
      properties:
        totalDeals:
          type: integer
        settledDeals:
          type: integer
        activeDeals:
          type: integer
        disputedDeals:
          type: integer
        totalEarnings:
          type: number
        pendingEarnings:
          type: number
        recentSettlements:
          type: array
          items:
            $ref: "#/components/schemas/Deal"

    Deal:
      type: object
      required: [id, code, shortUrl, itemName, description, price, deliveryWindowHours, status, sellerId, createdAt]
      properties:
        id:
          type: integer
        code:
          type: string
        shortUrl:
          type: string
        itemName:
          type: string
        description:
          type: ["string", "null"]
        price:
          type: number
        feeAmount:
          type: number
        sellerPayout:
          type: number
        deliveryWindowHours:
          type: integer
        status:
          type: string
          enum: [created, locked, dispatched, delivered, settled, disputed]
        fulfillmentType:
          type: ["string", "null"]
          enum: [shipped, delivered, service_completed, digital_sent, null]
        sellerId:
          type: integer
        buyerPhone:
          type: ["string", "null"]
        buyerName:
          type: ["string", "null"]
        sellerConfirmedAt:
          type: ["string", "null"]
        buyerConfirmedAt:
          type: ["string", "null"]
        dispatchedAt:
          type: ["string", "null"]
        deliveryDeadline:
          type: ["string", "null"]
        deliveryCode:
          type: ["string", "null"]
        settledAt:
          type: ["string", "null"]
        dispute:
          $ref: "#/components/schemas/Dispute"
        createdAt:
          type: string

    DealPublic:
      type: object
      required: [id, code, itemName, price, deliveryWindowHours, status, sellerName, createdAt]
      properties:
        id:
          type: integer
        code:
          type: string
        itemName:
          type: string
        description:
          type: ["string", "null"]
        price:
          type: number
        deliveryWindowHours:
          type: integer
        status:
          type: string
          enum: [created, locked, dispatched, delivered, settled, disputed]
        fulfillmentType:
          type: ["string", "null"]
          enum: [shipped, delivered, service_completed, digital_sent, null]
        sellerName:
          type: string
        sellerConfirmedAt:
          type: ["string", "null"]
        buyerConfirmedAt:
          type: ["string", "null"]
        deliveryDeadline:
          type: ["string", "null"]
        deliveryCode:
          type: ["string", "null"]
        createdAt:
          type: string

    DealList:
      type: object
      required: [deals, total]
      properties:
        deals:
          type: array
          items:
            $ref: "#/components/schemas/Deal"
        total:
          type: integer

    DealInput:
      type: object
      required: [itemName, price]
      properties:
        itemName:
          type: string
        description:
          type: string
        price:
          type: number
        deliveryWindowHours:
          type: integer
          default: 48

    FulfillInput:
      type: object
      required: [fulfillmentType, deliveryCode]
      properties:
        fulfillmentType:
          type: string
          enum: [shipped, delivered, service_completed, digital_sent]
        deliveryCode:
          type: string

    PaymentInput:
      type: object
      required: [buyerName, buyerPhone]
      properties:
        buyerName:
          type: string
        buyerPhone:
          type: string
        paymentMethod:
          type: string
          enum: [momo, card]
          default: momo

    Dispute:
      type: object
      required: [id, dealId, reason, status, createdAt]
      properties:
        id:
          type: integer
        dealId:
          type: integer
        reason:
          type: string
          enum: [item_never_arrived, wrong_damaged_item, incomplete_service]
        description:
          type: ["string", "null"]
        evidenceUrl:
          type: ["string", "null"]
        counterProofUrl:
          type: ["string", "null"]
        counterProofDescription:
          type: ["string", "null"]
        status:
          type: string
          enum: [open, counter_submitted, resolved_refund, resolved_seller, escalated]
        resolution:
          type: ["string", "null"]
        createdAt:
          type: string
        resolvedAt:
          type: ["string", "null"]

    DisputeInput:
      type: object
      required: [reason]
      properties:
        reason:
          type: string
          enum: [item_never_arrived, wrong_damaged_item, incomplete_service]
        description:
          type: string
        evidenceUrl:
          type: string

    CounterProofInput:
      type: object
      required: [counterProofUrl]
      properties:
        counterProofUrl:
          type: string
        counterProofDescription:
          type: string

    DisputeAdmin:
      type: object
      required: [id, dealId, deal, reason, status, createdAt]
      properties:
        id:
          type: integer
        dealId:
          type: integer
        deal:
          $ref: "#/components/schemas/Deal"
        reason:
          type: string
        description:
          type: ["string", "null"]
        evidenceUrl:
          type: ["string", "null"]
        counterProofUrl:
          type: ["string", "null"]
        counterProofDescription:
          type: ["string", "null"]
        status:
          type: string
        createdAt:
          type: string

    DisputeResolution:
      type: object
      required: [decision]
      properties:
        decision:
          type: string
          enum: [favor_buyer, favor_seller]
        resolution:
          type: string

    ActivityItem:
      type: object
      required: [id, type, dealId, itemName, amount, timestamp]
      properties:
        id:
          type: integer
        type:
          type: string
          enum: [deal_created, payment_locked, dispatched, delivered, settled, dispute_raised, dispute_resolved]
        dealId:
          type: integer
        itemName:
          type: string
        amount:
          type: number
        buyerName:
          type: ["string", "null"]
        timestamp:
          type: string
