kind = "web"
previewPath = "/"
title = "SETTLE"
version = "1.0.0"
id = "artifacts/settle"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 18674

[services.development]
run = "pnpm --filter @workspace/settle run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/settle", "run", "build" ]
publicDir = "artifacts/settle/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "18674"
BASE_PATH = "/"
